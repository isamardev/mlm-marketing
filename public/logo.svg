<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 72" width="360" height="72" role="img" aria-label="Digital Community Magnet">
  <defs>
    <linearGradient id="dcg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5ee7ff"/>
      <stop offset="55%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a5f3fc"/>
    </linearGradient>
    <linearGradient id="mag" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0f7ff"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Shield -->
  <path d="M8 14c0-4 3-6 6-6h52c3 0 6 2 6 6v28c0 12-16 22-32 28-16-6-32-16-32-28V14z" fill="none" stroke="url(#dcg)" stroke-width="1.25" opacity="0.85"/>
  <path d="M14 18h46v24c0 9-10 17-23 22-13-5-23-13-23-22V18z" fill="#0a1628" opacity="0.5"/>
  <!-- Circuit dots -->
  <circle cx="22" cy="26" r="2" fill="#f59e0b" opacity="0.9"/>
  <circle cx="52" cy="32" r="2" fill="#22d3ee"/>
  <path d="M24 26h12M40 32h8" stroke="#22d3ee" stroke-width="0.6" opacity="0.5"/>
  <!-- Arrow -->
  <path d="M18 12 L58 4" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>
  <path d="M54 2l6 4-5 3" fill="none" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Horseshoe magnet -->
  <g transform="translate(76,12)">
    <path d="M4 28c0-10 8-18 18-18s18 8 18 18v6H32v-6c0-4.5-3.5-8-8-8s-8 3.5-8 8v6H4v-6z" fill="url(#mag)" stroke="#67e8f9" stroke-width="1"/>
    <path d="M16 34 L22 24" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="10" cy="36" r="2.5" fill="#22d3ee" opacity="0.85"/>
    <circle cx="34" cy="36" r="2.5" fill="#f59e0b" opacity="0.85"/>
  </g>
  <!-- Wordmark -->
  <g transform="translate(118,8)">
    <text x="0" y="18" font-family="Segoe UI,system-ui,sans-serif" font-size="17" font-weight="700" font-style="italic" fill="url(#dcg)">Digital Community</text>
    <text x="0" y="40" font-family="Segoe UI,system-ui,sans-serif" font-size="20" font-weight="800" letter-spacing="0.06em" fill="url(#dcg)">MAGNET</text>
    <text x="0" y="54" font-family="Segoe UI,system-ui,sans-serif" font-size="9.5" font-weight="500" fill="#e2e8f0" opacity="0.95">connecting &amp; growing together</text>
  </g>
</svg>
